<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomupomu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,700;0,900;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="inverted">
    <main class="layout">
      <!-- Left: Tasks -->
      <section class="tasks-col">
        <ul class="task-list" id="task-list"></ul>
        <button class="clear-done-btn" id="clear-done-btn" onclick="clearDone()">clear done</button>
        <div class="task-add">
          <span class="task-add-icon">+</span>
          <input
            id="task-input"
            type="text"
            placeholder="add a task..."
            maxlength="80"
            class="task-add-input"
            onkeydown="handleTaskInput(event)"
          />
        </div>
      </section>

      <!-- Right: Timer -->
      <section class="timer-col">
        <div class="mode-tabs">
          <button class="mode-btn active" data-mode="pomodoro" onclick="setMode('pomodoro')">
            Pomodoro
          </button>
          <button class="mode-btn" data-mode="break" onclick="setMode('break')">
            Break
          </button>
        </div>

        <p class="tagline" id="tagline">it's time to <em>focus.</em></p>
        <div id="timer-display" onclick="onTimerClick(event)">00:00:00</div>

        <p class="sub-hint hidden" id="edit-hint">
          enter to start &nbsp;·&nbsp; esc to cancel
        </p>
        <p class="sub-hint confirm hidden" id="confirm-prompt">
          reset timer? &nbsp;·&nbsp; enter to confirm &nbsp;·&nbsp; esc to
          cancel
        </p>
        <p class="sub-hint hidden" id="alarm-hint">
          click or press any key to stop
        </p>
        <p class="sub-hint hidden" id="ready-hint">
          esc to reset &nbsp;·&nbsp; click timer to re-edit
        </p>
        <p class="sub-hint hidden" id="end-time-hint">
          <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:0.3em"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span id="end-time-text"></span>
        </p>

        <div class="timer-actions">
          <button class="timer-btn" id="timer-btn" onclick="onTimerBtnClick()">Start</button>
          <button class="reset-btn" id="reset-btn" onclick="onResetBtnClick()">Reset</button>
        </div>

        <div class="quick-btns">
          <button class="quick-btn" onclick="addMinutes(5)">+5m</button>
          <button class="quick-btn" onclick="addMinutes(10)">+10m</button>
          <button class="quick-btn" onclick="addMinutes(30)">+30m</button>
        </div>
      </section>
    </main>

    <div id="pause-overlay">
      <div class="pause-bar"></div>
      <div class="pause-bar"></div>
    </div>

    <script src="app.js"></script>
  </body>
</html>

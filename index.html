<!doctype html>
<html lang="en" data-theme="default">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomupomu</title>

    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,700;0,900;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="inverted">
    <main class="layout">
      <!-- Left: Tasks -->
      <section class="tasks-col">
        <ul class="task-list" id="task-list"></ul>
        <button
          class="clear-done-btn"
          id="clear-done-btn"
          onclick="clearDone()"
        >
          clear done
        </button>
        <div class="task-add">
          <span class="task-add-icon">+</span>
          <input
            id="task-input"
            type="text"
            placeholder="add a task..."
            maxlength="80"
            class="task-add-input"
            onkeydown="handleTaskInput(event)"
          />
        </div>
      </section>

      <!-- Right: Timer -->
      <section class="timer-col">
        <div class="mode-tabs-row">
          <div class="mode-tabs">
            <button
              class="mode-btn active"
              data-mode="pomodoro"
              onclick="setMode('pomodoro')"
            >
              Pomodoro
            </button>
            <button
              class="mode-btn"
              data-mode="break"
              onclick="setMode('break')"
            >
              Break
            </button>
          </div>
          <div class="mode-tabs-controls">
            <div class="theme-picker-wrap">
              <button id="theme-btn" onclick="toggleThemePicker()" title="Theme">
                <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/>
                  <path d="M12 3a9 9 0 0 1 0 18V3z" fill="currentColor"/>
                </svg>
                Theme
              </button>
              <div id="theme-picker" class="hidden">
                <button class="theme-option active" data-theme="default" onclick="setTheme('default')">
                  <svg class="theme-option-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
                  <span class="theme-option-name">Default</span>
                  <span class="theme-swatches">
                    <span class="theme-swatch" style="background:#000"></span>
                    <span class="theme-swatch" style="background:#808080"></span>
                    <span class="theme-swatch" style="background:#fff"></span>
                  </span>
                </button>
                <button class="theme-option" data-theme="gruvbox-light" onclick="setTheme('gruvbox-light')">
                  <svg class="theme-option-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
                  <span class="theme-option-name">Gruvbox Light</span>
                  <span class="theme-swatches">
                    <span class="theme-swatch" style="background:#98971a"></span>
                    <span class="theme-swatch" style="background:#928374"></span>
                    <span class="theme-swatch" style="background:#3c3836"></span>
                  </span>
                </button>
                <button class="theme-option" data-theme="olivia" onclick="setTheme('olivia')">
                  <svg class="theme-option-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
                  <span class="theme-option-name">Olivia</span>
                  <span class="theme-swatches">
                    <span class="theme-swatch" style="background:#c9a899"></span>
                    <span class="theme-swatch" style="background:#3d2d2a"></span>
                    <span class="theme-swatch" style="background:#e8ddd8"></span>
                  </span>
                </button>
              </div>
            </div>
            <button id="stats-btn" onclick="toggleStats()" title="Stats">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="13"
                height="13"
                viewBox="0 0 24 24"
                fill="currentColor"
              >
                <rect x="2" y="14" width="4" height="8" rx="1" />
                <rect x="10" y="8" width="4" height="14" rx="1" />
                <rect x="18" y="2" width="4" height="20" rx="1" />
              </svg>
              Stats
            </button>
          </div>
        </div>

        <p class="tagline" id="tagline">it's time to <em>focus.</em></p>
        <div id="timer-display" onclick="onTimerClick()">00:00:00</div>

        <div class="timer-actions">
          <button class="timer-btn" id="timer-btn" onclick="onTimerBtnClick()">
            Start
          </button>
          <button class="reset-btn" id="reset-btn" onclick="onResetBtnClick()">
            Reset
          </button>
          <p
            class="sub-hint end-time-hint"
            id="end-time-hint"
            style="visibility: hidden"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="11"
              height="11"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              style="vertical-align: middle; margin-right: 0.3em"
            >
              <circle cx="12" cy="12" r="10" />
              <polyline points="12 6 12 12 16 14" /></svg
            ><span id="end-time-text"></span>
          </p>
        </div>

        <p class="sub-hint confirm hidden" id="confirm-prompt">
          reset timer? &nbsp;·&nbsp; enter to confirm &nbsp;·&nbsp; esc to
          cancel
        </p>
        <p class="sub-hint hidden" id="alarm-hint">
          click or press any key to stop
        </p>

        <div class="quick-btns">
          <button class="quick-btn" onclick="addMinutes(1)">+1m</button>
          <button class="quick-btn" onclick="addMinutes(5)">+5m</button>
          <button class="quick-btn" onclick="addMinutes(10)">+10m</button>
          <button class="quick-btn" onclick="addMinutes(30)">+30m</button>
          <button class="quick-btn" onclick="addMinutes(45)">+45m</button>
          <button class="quick-btn" onclick="addMinutes(60)">+60m</button>
        </div>
      </section>
    </main>

    <div id="session-modal" class="hidden">
      <div class="session-modal-box">
        <div class="session-modal-header">
          <span class="session-modal-heading">Session complete</span>
          <button class="session-modal-skip" onclick="skipSessionModal()">
            Skip
          </button>
        </div>
        <input
          id="session-title-input"
          type="text"
          maxlength="20"
          placeholder="Title (max 20 chars)"
          class="session-field-input"
          onkeydown="handleSessionTitleKey(event)"
        />
        <textarea
          id="session-desc-input"
          placeholder="Notes..."
          class="session-field-textarea"
          rows="3"
          onkeydown="handleSessionDescKey(event)"
        ></textarea>
        <button class="session-modal-save" onclick="saveSessionModal()">
          Save
        </button>
      </div>
    </div>

    <div id="all-sessions-modal" class="hidden">
      <div class="stats-header">
        <span class="stats-title">All Sessions</span>
        <button class="stats-close" onclick="hideAllSessionsModal()">×</button>
      </div>
      <div id="all-sessions-list"></div>
    </div>

    <div id="session-detail-modal" class="hidden">
      <div class="session-detail-box">
        <div class="session-detail-header">
          <span class="session-detail-title" id="detail-title"></span>
          <button class="stats-close" onclick="hideSessionDetail()">×</button>
        </div>
        <p class="session-detail-meta" id="detail-meta"></p>
        <div
          id="detail-desc-section"
          class="session-detail-desc-section hidden"
        >
          <p class="session-detail-desc" id="detail-desc"></p>
        </div>
      </div>
    </div>

    <div id="stats-panel" class="hidden">
      <div class="stats-header">
        <span class="stats-title">Stats</span>
        <button class="stats-close" onclick="toggleStats()">×</button>
      </div>
      <div class="stats-cards">
        <div class="stat-card">
          <div class="stat-value" id="stat-streak">0</div>
          <div class="stat-label">Day Streak</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-total">0m</div>
          <div class="stat-label">Total Focus</div>
        </div>
      </div>
      <div class="stats-section">
        <div class="stats-section-title">Consistency</div>
        <div id="consistency-grid"></div>
      </div>
      <div class="stats-section">
        <div class="stats-section-title">This Week</div>
        <div id="weekly-chart" class="weekly-chart"></div>
      </div>
      <div class="stats-section">
        <div class="stats-section-header">
          <div class="stats-section-title">Recent Sessions</div>
          <button id="see-all-btn" class="see-all-btn" onclick="toggleSeeAll()">
            See all
          </button>
        </div>
        <ul id="recent-sessions" class="recent-list"></ul>
      </div>
    </div>

    <div id="pause-overlay">
      <div class="pause-bar"></div>
      <div class="pause-bar"></div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
